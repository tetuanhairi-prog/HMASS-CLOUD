    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #080808;
            color: #f0f0f0;
            -webkit-tap-highlight-color: transparent;
        }

        .font-legal {
            font-family: 'Libre Baskerville', serif;
        }

        .font-signature {
            font-family: 'Dancing Script', cursive;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080808; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3a3a3a; }

        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        .animate-fadeOut { animation: fadeOut 0.3s ease-in forwards; }
        .animate-slideUp { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-slideDown { animation: slideDown 0.3s cubic-bezier(0.7, 0, 0.84, 0) forwards; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideDown { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(20px); } }

        /* Enhanced Professional Focus Effect with Shimmer/Glow */
        .input-gold-focus {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none !important;
            border: 1px solid #333;
            background: #0d0d0d;
        }
        
        .input-gold-focus:focus {
            border-color: #FFD700 !important;
            background: linear-gradient(90deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
            background-size: 200% 100%;
            color: #ffffff !important;
            transform: translateY(-2px);
            animation: 
                gold-glow-pulse-intense 2s infinite ease-in-out,
                gold-shimmer-sweep 3s infinite linear;
            box-shadow: 0 10px 25px -5px rgba(255, 215, 0, 0.2), 0 8px 10px -6px rgba(255, 215, 0, 0.1);
        }

        @keyframes gold-shimmer-sweep {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes gold-glow-pulse-intense {
            0% { 
                border-color: rgba(255, 215, 0, 0.5);
                filter: brightness(1);
            }
            50% { 
                border-color: rgba(255, 215, 0, 1);
                filter: brightness(1.2);
            }
            100% { 
                border-color: rgba(255, 215, 0, 0.5);
                filter: brightness(1);
            }
        }

        ::placeholder {
            color: #4a4a4a !important;
            opacity: 1;
            font-weight: 500;
        }

        @media print {
            .no-print, .no-print * { display: none !important; }
            html, body {
                width: 100%;
                height: auto !important;
                margin: 0;
                padding: 0;
                background-color: white !important;
            }
        }
    </style>
